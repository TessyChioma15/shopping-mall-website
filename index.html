<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chomzy Shopping Mall</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        /* Header */
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #555;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #333;
        }

        /* Sections */
        section {
            padding: 20px;
        }

        /* Product layout */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        /* Forms */
        form {
            background: white;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

    <script>
        function addToCart(product) {
            alert(product + " added to cart!");
        }

        function submitOrder() {
            alert("Your order has been submitted!");
        }

        function sendMessage() {
            alert("Your inquiry has been sent!");
        }
    </script>

</head>

<body>

    <header>
        <h1>Chomzy Shopping Mall</h1>
        <p>Your Online Shopping Destination</p>
    </header>

    <nav>
        <a href="#shop">Shop</a>
        <a href="#order">Order</a>
        <a href="#payment">Payment</a>
        <a href="#inquiry">Inquiry</a>
    </nav>

    <!-- SHOP SECTION -->
    <section id="shop">

        <h2>Shop Products</h2>

        <div class="products">

            <div class="product">
                <h3>Shoes</h3>
                <p>Price: ₦15,000</p>
                <button onclick="addToCart('Shoes')">Add to Cart</button>
            </div>

            <div class="product">
                <h3>Handbag</h3>
                <p>Price: ₦8,000</p>
                <button onclick="addToCart('Handbag')">Add to Cart</button>
            </div>

            <div class="product">
                <h3>Phone</h3>
                <p>Price: ₦120,000</p>
                <button onclick="addToCart('Phone')">Add to Cart</button>
            </div>

            <div class="product">
                <h3>Headphones</h3>
                <p>Price: ₦10,000</p>
                <button onclick="addToCart('Headphones')">Add to Cart</button>
            </div>

        </div>

    </section>

    <!-- ORDER SECTION -->
    <section id="order">

        <h2>Order Goods</h2>

        <form onsubmit="submitOrder(); return false;">
            <input type="text" placeholder="Your Name" required>

            <input type="text" placeholder="Product Name" required>

            <input type="number" placeholder="Quantity" required>

            <textarea placeholder="Delivery Address"></textarea>

            <button type="submit">Submit Order</button>
        </form>

    </section>

    <!-- PAYMENT SECTION -->
    <section id="payment">

        <h2>Make Payment</h2>

        <form>

            <input type="text" placeholder="Card Number">

            <input type="text" placeholder="Expiry Date">

            <input type="password" placeholder="CVV">

            <button type="submit">Pay Now</button>

        </form>

    </section>

    <!-- INQUIRY SECTION -->
    <section id="inquiry">

        <h2>Customer Inquiry</h2>

        <form onsubmit="sendMessage(); return false;">

            <input type="text" placeholder="Your Name">

            <input type="email" placeholder="Your Email">

            <textarea placeholder="Your Message"></textarea>

            <button type="submit">Send Message</button>

        </form>

    </section>

    <footer>
        <p>© 2026 Chomzy Shopping Mall</p>
    </footer>

</body>


</html>
